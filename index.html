<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página de Concientización</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      line-height: 0; /* 🔥 esto elimina la línea */
    }
  </style>
</head>

<body>

  <img src="prueba_top.png">
  <img src="prueba_middle.png">
  <img src="prueba_bottom.png">

</body>
</html>
